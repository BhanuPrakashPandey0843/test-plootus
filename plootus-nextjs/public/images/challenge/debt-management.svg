  <circle cx="30" cy="32" r="10" fill="#F6C244"/>
  <text x="30" y="36" text-anchor="middle" fill="#1E4D6B" font-size="10" font-weight="bold">$</text>
  <circle cx="70" cy="32" r="10" fill="#F6C244"/>
  <text x="70" y="36" text-anchor="middle" fill="#1E4D6B" font-size="10" font-weight="bold">$</text>
</svg>
